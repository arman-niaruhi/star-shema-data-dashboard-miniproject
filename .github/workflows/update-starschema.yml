name: Automatic-Pipeline-Refresh

on:
  workflow_dispatch:
  push:
    branches:
      - main
  schedule:
    - cron: "0 6 * * *"

permissions:
  contents: write

jobs:
  rebuild-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas streamlit

      - name: Rebuild staging source data
        run: python staging/build_staging.py

      - name: Rebuild starschema data
        run: python starschema/build_starschema.py

      - name: Validate generated files
        run: |
          test -f data/staging/source_sales.csv
          test -f data/starschema/dim_customer.csv
          test -f data/starschema/dim_product.csv
          test -f data/starschema/dim_date.csv
          test -f data/starschema/fact_sales.csv

      - name: Smoke test dashboard import
        run: python -c "import runpy; runpy.run_path('dashboard/app.py', run_name='__main__')"

      - name: Commit refreshed data artifacts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/staging/source_sales.csv data/starschema
          git diff --cached --quiet || git commit -m "Update starschema data"
          git push
