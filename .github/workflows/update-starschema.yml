name: Automatic-Pipeline-Refresh

on:
  workflow_dispatch:
  push:
    branches:
      - main
  schedule:
    - cron: "0 6 * * *"

permissions:
  contents: write

jobs:
  staging:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas streamlit

      - name: Build staging source data
        run: python staging/build_staging.py

      - name: Upload staging artifact
        uses: actions/upload-artifact@v4
        with:
          name: staging-data
          path: |
            data/staging/erp_customers.csv
            data/staging/erp_materials.csv
            data/staging/erp_orders.csv
            data/staging/erp_fulfillment.csv

  starschema:
    runs-on: ubuntu-latest
    needs: staging

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas streamlit

      - name: Download staging artifact
        uses: actions/download-artifact@v4
        with:
          name: staging-data
          path: data/staging

      - name: Build starschema data
        run: python starschema/build_starschema.py

      - name: Upload starschema artifacts
        uses: actions/upload-artifact@v4
        with:
          name: starschema-data
          path: data/starschema

  validate-and-publish:
    runs-on: ubuntu-latest
    needs:
      - staging
      - starschema

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas streamlit

      - name: Download staging artifact
        uses: actions/download-artifact@v4
        with:
          name: staging-data
          path: data/staging

      - name: Download starschema artifacts
        uses: actions/download-artifact@v4
        with:
          name: starschema-data
          path: data/starschema

      - name: Validate generated files
        run: |
          test -f data/staging/erp_customers.csv
          test -f data/staging/erp_materials.csv
          test -f data/staging/erp_orders.csv
          test -f data/staging/erp_fulfillment.csv
          test -f data/starschema/dim_customer.csv
          test -f data/starschema/dim_product.csv
          test -f data/starschema/dim_date.csv
          test -f data/starschema/fact_sales.csv

      - name: Smoke test dashboard import
        run: python -c "import runpy; runpy.run_path('dashboard/app.py', run_name='__main__')"

      - name: Commit refreshed data artifacts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/staging/erp_customers.csv data/staging/erp_materials.csv data/staging/erp_orders.csv data/staging/erp_fulfillment.csv data/starschema
          git diff --cached --quiet || git commit -m "Update starschema data"
          git push
